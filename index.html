<style>
    /* Estilo do Balão de Diálogo Profissional */
    #dialogue-box { 
        position: absolute; 
        bottom: 20px; 
        left: 50%; 
        transform: translateX(-50%);
        width: 90%;
        background: rgba(15, 15, 25, 0.85); /* Azul bem escuro e translúcido */
        border: 3px solid #c9a55c; /* Borda dourada */
        border-radius: 10px;
        padding: 30px; 
        box-sizing: border-box;
        min-height: 150px;
        z-index: 5;
        box-shadow: 0 0 15px rgba(0,0,0,0.8);
    }

    #name-tag { 
        position: absolute; 
        top: -20px; 
        left: 30px; 
        background: #c9a55c; 
        color: #1a1a1a; 
        padding: 5px 25px; 
        font-weight: bold; 
        font-size: 20px;
        border-radius: 5px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    #text { 
        font-size: 22px; 
        line-height: 1.6; 
        color: #f0f0f0;
        text-shadow: 1px 1px 2px #000;
    }

    /* Ajuste dos botões de escolha */
    #options {
        z-index: 100; /* Garante que fiquem acima de tudo */
    }
</style>

<div id="game-container">
    <div id="stats">❤️ HP: <span id="hp">100</span> | ✨ MP: <span id="mp">100</span></div>
    
    <img id="background" src="image_11.png" alt="Cenário">
    
    <div id="options" class="hidden"></div>

    <div id="dialogue-box">
        <div id="name-tag">ELARA</div>
        <div id="text">O selo exige um catalisador... Qual será o preço da verdade?</div>
    </div>
</div>
