<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fantásticos Games - O Selo de Elara (Protótipo Responsivo)</title>
    <style>
        /* Define a estrutura responsiva do contêiner */
        body { background: #1a1a1a; color: #e0e0e0; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        #game-container { 
            /* O segredo da responsividade: use porcentagens com um max-width */
            width: 80%; 
            max-width: 1200px; 
            height: 80vh; 
            background: #000; 
            border: 4px solid #444; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        }
        
        #stats { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            font-size: 1.2rem; /* Use 'rem' para escalonamento de fonte */
            z-index: 10; 
            background: rgba(0,0,0,0.7); 
            padding: 8px 20px; 
            border-radius: 5px; 
            border: 1px solid #c9a55c; 
        }
        
        #background { 
            /* O fundo agora escala com o contêiner */
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 1; 
            transition: opacity 0.5s; 
        }
        
        /* Estilo Dinâmico do Balão de Diálogo (não estático na imagem) */
        #dialogue-box { 
            position: absolute; 
            bottom: 10px; 
            left: 10px; 
            right: 10px; 
            background: rgba(15, 15, 25, 0.9); /* Azul escuro translúcido */
            border: 2px solid #c9a55c; /* Borda dourada */
            border-radius: 8px;
            padding: 1.5rem; 
            min-height: 120px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centraliza o texto verticalmente */
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        #name-tag { 
            position: absolute; 
            top: -10px; 
            left: 15px; 
            background: #c9a55c; 
            color: #1a1a1a; 
            padding: 2px 15px; 
            font-weight: bold; 
            font-size: 1.1rem;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #text { 
            font-size: 1.3rem; 
            line-height: 1.6; 
            color: #f0f0f0;
            text-shadow: 1px 1px 2px #000;
        }

        /* Ajuste dos botões de escolha */
        #options { 
            display: flex; 
            gap: 10px; 
            position: absolute; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            flex-direction: column; 
            width: 300px; 
            z-index: 20; 
        }
        
        button { 
            background: rgba(34, 34, 34, 0.9); 
            color: #c9a55c; 
            border: 2px solid #c9a55c; 
            padding: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-family: 'Georgia', serif; 
            font-size: 1.1rem; 
            font-weight: bold; 
        }
        
        button:hover { 
            background: #c9a55c; 
            color: #000; 
        }
        
        .hidden { display: none !important; }
        
        /* Media Query para telas menores */
        @media (max-width: 600px) {
            #game-container { width: 100%; height: 60vh; border-width: 2px; }
            #options { width: 90%; }
            #text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats">❤️ HP: <span id="hp">100</span> | ✨ MP: <span id="mp">100</span></div>
    
    <img id="background" src="bg_elara_guardian_clean.png" alt="Encontro com o Guardião">
    
    <div id="options" class="hidden"></div>

    <div id="dialogue-box">
        <div id="name-tag">ELARA</div>
        <div id="text">O selo exige um catalisador... Qual será o preço da verdade?</div>
    </div>
</div>

<script>
    let hp = 100;
    let mp = 100;

    const gameData = {
        start: {
            text: "O Guardião das Sombras bloqueia o caminho. 'O conhecimento exige sacrifício', sussurra. O que você escolhe?",
            options: [
                { text: "Pela força! (Gasta 30 MP)", action: () => updateStats(0, -30, 'fight') },
                { text: "Fugir deste lugar", action: () => updateStats(0, 0, 'run') },
                { text: "Não reagir...", action: () => updateStats(-100, 0, 'surrender') }
            ]
        },
        // Estas cenas abaixo ainda não têm assets visuais específicos,
        // mas o motor e o fundo limpo já funcionam.
        fight: { text: "O brilho da sua magia consome as sombras! Você venceu, mas está exausta.", options: [] },
        run: { text: "Você sobreviveu, mas o segredo continua enterrado. O mundo sentirá sua covardia.", options: [] },
        surrender: { text: "As correntes de névoa prendem seus pulsos. Sua jornada termina na escuridão.", options: [] }
    };

    function updateStats(hpChange, mpChange, nextScene) {
        hp += hpChange;
        mp += mpChange;
        document.getElementById('hp').innerText = hp;
        document.getElementById('mp').innerText = mp;
        
        document.getElementById('options').classList.add('hidden');
        renderScene(nextScene);
    }

    function renderScene(sceneKey) {
        const scene = gameData[sceneKey];
        
        // Troca de fundo dinâmica (simulando a troca de sprites no Ren'Py)
        // No momento, todas as cenas finais usam o mesmo fundo limpo.
        document.getElementById('text').innerText = scene.text;

        // Se houver opções, exibe-as no menu central e esconde o diálogo
        if (scene.options.length > 0) {
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = ''; // Limpa botões antigos
            
            scene.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.text;
                btn.onclick = opt.action;
                optContainer.appendChild(btn);
            });
            optContainer.classList.remove('hidden');
            // Esconde o diálogo para as escolhas (estilo Visual Novel)
            document.getElementById('dialogue-box').classList.add('hidden');
        } else {
            // Se não houver opções, exibe o diálogo (é uma tela final)
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = '';
            
            const btn = document.createElement('button');
            btn.innerText = "Fim do Protótipo (Recarregar)";
            btn.onclick = () => location.reload();
            optContainer.appendChild(btn);
            optContainer.classList.remove('hidden');
            
            // Reexibe o diálogo para o texto final
            document.getElementById('dialogue-box').classList.remove('hidden');
        }
    }

    // Inicializa a cena principal
    renderScene('start');
</script>

</body>
</html>
