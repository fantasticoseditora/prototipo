<script>
    // --- 0. Pré-carregamento de Imagens (Preloading) ---
    // Coloque aqui o nome exato de todas as imagens que o jogo vai usar
    const imagesToPreload = [
        "image_11.png",
        "bg_elara_victory_clean.png",
        "bg_elara_capture_clean.png",
        "bg_elara_retreat_clean.png"
    ];

    // Essa função carrega as imagens na memória do navegador em segundo plano
    function preloadImages(array) {
        if (!preloadImages.list) {
            preloadImages.list = [];
        }
        const list = preloadImages.list;
        for (let i = 0; i < array.length; i++) {
            const img = new Image();
            img.onload = function() {
                const index = list.indexOf(this);
                if (index !== -1) {
                    // Remove da lista quando carregar (opcional, para limpeza)
                    list.splice(index, 1);
                }
            }
            list.push(img);
            img.src = array[i];
        }
    }

    // Inicia o pré-carregamento assim que o script é lido
    preloadImages(imagesToPreload);

    // --- 1. Estado do Jogo (Variáveis) ---
    let playerHP = 100;
    let playerMP = 100;

    // --- 2. Dados das Cenas (O "Roteiro") ---
    const storyData = {
        start: {
            speaker: "O GUARDIÃO",
            text: "'O conhecimento exige sacrifício', sussurra a criatura de névoa, bloqueando a porta. 'Como você passará?'",
            bgImage: "image_11.png", 
            options: [
                { text: "Pela força! (Gasta 30 MP)", action: () => changeScene('fight', 0, -30) },
                { text: "Eu não pertenço a este lugar. (Fugir)", action: () => changeScene('run', 0, 0) },
                { text: "Não sei se estou pronta... (Hesitar)", action: () => changeScene('surrender', -100, 0) }
            ]
        },
        fight: { 
            speaker: "SISTEMA",
            text: "O brilho da sua magia consome as sombras! Você venceu, mas o esforço foi grande. O caminho para os segredos da cripta está aberto.", 
            bgImage: "bg_elara_victory_clean.png", 
            options: [] 
        },
        run: { 
            speaker: "SISTEMA",
            text: "O ar puro do exterior queima seus pulmões. Você sobreviveu, mas o selo permanece intacto e o destino do mundo continua selado.", 
            bgImage: "bg_elara_retreat_clean.png", 
            options: [] 
        },
        surrender: { 
            speaker: "SISTEMA",
            text: "As correntes de névoa prendem seus pulsos e a escuridão toma conta. Sua jornada termina na frieza desta prisão.", 
            bgImage: "bg_elara_capture_clean.png", 
            options: [] 
        }
    };

    // --- 3. Lógica do Jogo (Funções) ---

    function resetGame() {
        playerHP = 100;
        playerMP = 100;
        
        document.getElementById('hp').innerText = playerHP;
        document.getElementById('mp').innerText = playerMP;
        
        document.getElementById('options-container').classList.add('hidden');
        document.getElementById('dialogue-container').classList.add('hidden');
        
        // Vai direto para o início
        renderScene('start');
    }

    function changeScene(sceneKey, hpChange, mpChange) {
        playerHP += hpChange;
        playerMP += mpChange;
        if (playerHP < 0) playerHP = 0;
        
        document.getElementById('hp').innerText = playerHP;
        document.getElementById('mp').innerText = playerMP;
        
        renderScene(sceneKey);
    }

    function renderScene(sceneKey) {
        const scene = storyData[sceneKey];
        const bgElement = document.getElementById('background');
        const dialogueBox = document.getElementById('dialogue-container');
        const optContainer = document.getElementById('options-container');
        
        // 1. Oculta tudo durante a transição
        dialogueBox.classList.add('hidden');
        optContainer.classList.add('hidden');
        
        // 2. Inicia o fade out da imagem
        bgElement.classList.remove('fade-in');
        bgElement.classList.add('fade-out');
        
        setTimeout(() => {
            // 3. Troca a imagem
            if (scene.bgImage) {
                bgElement.src = scene.bgImage;
            }
            
            // 4. Inicia o fade in da imagem
            bgElement.classList.remove('fade-out');
            bgElement.classList.add('fade-in');

            // 5. Atualiza os textos
            document.getElementById('speaker-name').innerText = scene.speaker;
            document.getElementById('dialogue-text').innerText = scene.text;

            // 6. Configura os botões
            optContainer.innerHTML = ''; 

            if (scene.options.length > 0) {
                // Cena de escolha (mostra opções, esconde diálogo)
                scene.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.onclick = opt.action;
                    optContainer.appendChild(btn);
                });
                optContainer.classList.remove('hidden'); 
            } else {
                // Tela final (mostra diálogo e botão de recomeçar)
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = "Fim do Protótipo - Jogar Novamente";
                btn.onclick = resetGame; 
                optContainer.appendChild(btn);
                
                optContainer.classList.remove('hidden');
                dialogueBox.classList.remove('hidden');
            }
        }, 500); // Espera o fade-out terminar
    }

    // --- 4. Iniciar Jogo ---
    window.onload = () => {
        resetGame();
    };
</script>
